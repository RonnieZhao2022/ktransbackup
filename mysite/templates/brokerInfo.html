<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>清关代理信息</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>


            td, th {
            /* 设置td,th宽度高度 */
            border:1px solid gray;
            width:auto;
            height:auto;
        }


        td:first-child, th:first-child {
            position:sticky;
            left:0; /* 首行永远固定在左侧 */
            z-index:1;
            background-color:lightgrey;
        }
        thead tr th {
            position:sticky;
            top:0; /* 列首永远固定在头部  */
            background-color:lightblue;
        }
        th:first-child{
            z-index:2;
            background-color:lightgrey;
        }
    </style>
</head>
<body>

<div class="container">
        <div >
            <table class="table" style="font-size:15px;white-space:nowrap">
                 <caption class="caption-top">总共有{{myresult|length}}条相关信息</caption>
                  <thead>
                    <tr>
                        <th scope="col"  style="background-color:lightblue">名称</th>
                        <th scope="col"  style="background-color:lightblue">邮件</th>
                        <th scope="col"  style="background-color:lightblue">电话</th>
                        <th scope="col"  style="background-color:lightblue">城市</th>
                        <th scope="col"  style="background-color:lightblue">联系人</th>
                        <th scope="col"  style="background-color:lightblue">业务范围</th>
                        <th scope="col"  style="background-color:lightblue">备注</th>
                        <th scope="col"  style="background-color:lightblue">星级</th>

                    </tr>
                  </thead>


                  <tbody >

                  {%  for row in myresult %}

                    <tr >
                        {%  for td in row %}

                            {% if loop.index == 7 %}

                               <td class="text-truncate" style="max-width: 200px;">{{td}}</td>

                            {% else %}

                                <td class="text-truncate" >{{td}}</td>

                            {% endif  %}


                        {% endfor  %}





                    </tr>
                  {% endfor  %}

                  </tbody>





            </table>
        </div>

    </div>

    <div class = "container"  >

        <h4>添加新的清关代理信息</h4>

    </div>



    <div class = "container"  >



        <form method="post"  enctype="multipart/form-data">

                <div class="container" >

                    <!--公司名称  -->
                    <div class="form-group col-md-9">
                        <label for="company" class="form-label">公司名称</label>
                        <input type="text" class="form-control" id="company" name = "company" required placeholder = "必填，不能为空！！！" >
                    </div>

                    <!--公司邮件  -->
                    <div class="form-group col-md-9">
                        <label for="email" class="form-label">公司邮件</label>
                        <input type="text" class="form-control" id="email" name = "email" required placeholder = "必填，不能为空！！！" >

                    </div>

                    <!--电话  -->
                    <div class="form-group col-md-9">
                        <label for="cell" class="form-label">电话</label>
                        <input type="text" class="form-control" id="cell" name = "cell" placeholder = "请输入公司电话" >
                    </div>

                    <!--所在城市  -->
                    <div class="form-group col-md-9">
                        <label for="city" class="form-label">所在城市</label>
                        <input type="text" class="form-control" id="city" name = "city" placeholder = "请输入公司所在城市 英文 字母全部大写" >
                    </div>

                    <!--联系人姓名  -->
                    <div class="form-group col-md-9">
                        <label for="contact" class="form-label">联系人姓名</label>
                        <input type="text" class="form-control" id="contact" name = "contact" placeholder = "请输入公司联系人姓名" >
                    </div>



                    <!--业务范围  -->
                    <div class="form-group col-md-3">
                          <label for="country" class="form-label">业务范围</label>
                          <select id="country" name = "country" class="form-control">
                                <option selected>CA</option>
                                <option >US</option>
                          </select>
                    </div>

                    <!--备注  -->
                    <div class="form-group">
                        <label for="remark" class="form-label">备注</label>
                        <textarea class="form-control" id="remark" name = "remark"  rows="3"   placeholder = "请输入公司备注"></textarea>
                    </div>

                    <!--星级  -->
                    <div class="form-group col-md-9">
                        <label for="star" class="form-label">星级</label>
                        <input type="text" class="form-control" id="star" name = "star" placeholder = "请输入公司星级 1-5" >
                    </div>




                </div>





                <div class="form-row" >
                    <button type="submit" class="btn btn-primary">提交</button>
                </div>





        </form>

</div>



<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</body>
</html>
