<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>国内代理货物信息查询</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>


            td, th {
            /* 设置td,th宽度高度 */
            border:1px solid gray;
            width:auto;
            height:auto;
        }


        td:first-child, th:first-child {
            position:sticky;
            left:0; /* 首行永远固定在左侧 */
            z-index:1;
            background-color:lightgrey;
        }
        thead tr th {
            position:sticky;
            top:0; /* 列首永远固定在头部  */
            background-color:lightblue;
        }
        th:first-child{
            z-index:2;
            background-color:lightgrey;
        }
    </style>
</head>
<body>

<div class="container">
        <div >
            <table class="table" style="font-size:15px;white-space:nowrap">


                    <caption class="caption-top">目前贵司尚在操作中的货物总共有{{cargoList|length}}票,详情如下：</caption>




                  <thead>
                    <tr>
                        <th scope="col"  style="background-color:lightblue">单号</th>
                        <th scope="col"  style="background-color:lightblue">状态</th>
                        <th scope="col"  style="background-color:lightblue">货柜号</th>
                        <th scope="col"  style="background-color:lightblue">船名</th>
                        <th scope="col"  style="background-color:lightblue">运输类型</th>
                        <th scope="col"  style="background-color:lightblue">服务类型</th>
                        <th scope="col"  style="background-color:lightblue">出发城市</th>
                        <th scope="col"  style="background-color:lightblue">目的城市</th>
                        <th scope="col"  style="background-color:lightblue">抵达铁路终端时间</th>
                        <th scope="col"  style="background-color:lightblue">LFD</th>
                        <th scope="col"  style="background-color:lightblue">货物数量</th>
                        <th scope="col"  style="background-color:lightblue">货物重量</th>
                        <th scope="col"  style="background-color:lightblue">货物体积</th>
                        <th scope="col"  style="background-color:lightblue">国内代理</th>
                        <th scope="col"  style="background-color:lightblue">操作员</th>

                    </tr>
                  </thead>


                  <tbody >

                  {%  for row in cargoList %}

                    <tr >
                        {%  for td in row %}



                            <td class="text-truncate" >{{td}}</td>




                        {% endfor  %}



                    </tr>
                  {% endfor  %}

                  </tbody>





            </table>
        </div>

  </div>







<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</body>
</html>
