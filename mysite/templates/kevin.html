<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Container with Cargo</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">

    <h2 class="mb-4">Create Container</h2>

    <form method="POST" action="/create_container">

        <!-- ===================== -->
        <!-- Container Information -->
        <!-- ===================== -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                Container Information
            </div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label>Order ID</label>
                        <input type="text" name="order_id" class="form-control" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Container Number</label>
                        <input type="text" name="container_number" class="form-control" required>
                    </div>
                    <div class="form-group col-md-4">
                        <label>Status</label>
                        <select name="status" class="form-control">
                            <option value="AT SEA">AT SEA</option>
                            <option value="ARRIVED">ARRIVED</option>
                            <option value="DELIVERED">DELIVERED</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label>Operator</label>
                        <input type="number" name="operator" class="form-control">
                    </div>
                    <div class="form-group col-md-6">
                        <label>Remark</label>
                        <textarea name="remark" class="form-control"></textarea>
                    </div>
                </div>

            </div>
        </div>

        <!-- ===================== -->
        <!-- Cargo Sections -->
        <!-- ===================== -->
        <div class="card mb-4">
            <div class="card-header bg-success text-white">
                Cargo Sections
            </div>
            <div class="card-body">

                <div id="cargoContainer">

                    <div class="cargo-item border rounded p-3 mb-3">

                        <div class="form-row">

                            <div class="form-group col-md-2">
                                <label>Section</label>
                                <input type="text" name="section[]" class="form-control section-field" readonly>
                            </div>

                            <div class="form-group col-md-3">
                                <label>Mark</label>
                                <input type="text" name="mark[]" class="form-control">
                            </div>

                            <div class="form-group col-md-3">
                                <label>Regular Client</label>
                                <select name="regular_client[]" class="form-control">
                                    <option value=""></option>
                                    <option value="是">是</option>
                                    <option value="否">否</option>
                                </select>
                            </div>

                            <div class="form-group col-md-4">
                                <label>Remark</label>
                                <input type="text" name="cargo_remark[]" class="form-control">
                            </div>

                        </div>

                        <div class="form-row">

                            <div class="form-group col-md-2">
                                <label>Hold</label>
                                <input type="text" name="hold[]" class="form-control">
                            </div>

                            <div class="form-group col-md-2">
                                <label>Service Type</label>
                                <input type="text" name="service_type[]" class="form-control">
                            </div>

                            <div class="form-group col-md-2">
                                <label>Status</label>
                                <input type="text" name="cargo_status[]" class="form-control" value="未派送">
                            </div>

                            <div class="form-group col-md-2">
                                <label>Cargo Type</label>
                                <input type="text" name="cargo_type[]" class="form-control">
                            </div>

                            <div class="form-group col-md-2">
                                <label>Amount</label>
                                <input type="text" name="amount[]" class="form-control">
                            </div>

                            <div class="form-group col-md-2">
                                <label>Weight</label>
                                <input type="number" step="0.01" name="weight[]" class="form-control weight-field">
                            </div>

                        </div>

                        <div class="form-row">

                            <div class="form-group col-md-2">
                                <label>Volume</label>
                                <input type="text" name="volume[]" class="form-control">
                            </div>

                            <div class="form-group col-md-3">
                                <label>Size</label>
                                <input type="text" name="size[]" class="form-control">
                            </div>

                            <div class="form-group col-md-2">
                                <label>Broker</label>
                                <input type="number" name="broker[]" class="form-control">
                            </div>

                            <div class="form-group col-md-3">
                                <label>Client</label>
                                <input type="text" name="client[]" class="form-control">
                            </div>

                            <div class="form-group col-md-2 d-flex align-items-end">
                                <button type="button" class="btn btn-danger removeCargo">X</button>
                            </div>

                        </div>

                        <div class="form-row">

                            <div class="form-group col-md-3">
                                <label>Company</label>
                                <input type="text" name="company[]" class="form-control">
                            </div>

                            <div class="form-group col-md-3">
                                <label>Email</label>
                                <input type="email" name="email[]" class="form-control">
                            </div>

                            <div class="form-group col-md-3">
                                <label>Phone</label>
                                <input type="text" name="phone[]" class="form-control">
                            </div>

                            <div class="form-group col-md-3">
                                <label>Address</label>
                                <input type="text" name="address[]" class="form-control">
                            </div>

                        </div>

                        <div class="form-row">

                            <div class="form-group col-md-3">
                                <label>Delivery Type</label>
                                <input type="text" name="delivery_type[]" class="form-control">
                            </div>

                            <div class="form-group col-md-3">
                                <label>CCN</label>
                                <input type="text" name="ccn[]" class="form-control">
                            </div>

                            <div class="form-group col-md-3">
                                <label>Old CCN</label>
                                <input type="text" name="old_ccn[]" class="form-control">
                            </div>

                            <div class="form-group col-md-3">
                                <label>Payment Methods</label>
                                <input type="text" name="payment_methods[]" class="form-control">
                            </div>

                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-3">
                                <label>ETA to Client</label>
                                <input type="datetime-local" name="eta_to_client[]" class="form-control">
                            </div>
                        </div>

                    </div>

                </div>

                <button type="button" id="addCargo" class="btn btn-secondary">+ Add Cargo Section</button>

                <hr>
                <h5>Total Weight: <span id="totalWeight">0.00</span></h5>

            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg">Save Container</button>

    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const cargoContainer = document.getElementById("cargoContainer");
    const addCargoBtn = document.getElementById("addCargo");
    const totalWeightDisplay = document.getElementById("totalWeight");

    function updateSections() {
        const sections = document.querySelectorAll(".section-field");
        sections.forEach((input, index) => {
            input.value = String.fromCharCode(65 + index); // A, B, C...
        });
    }

    function calculateTotalWeight() {
        let total = 0;
        const weights = document.querySelectorAll(".weight-field");
        weights.forEach(input => {
            const value = parseFloat(input.value);
            if (!isNaN(value)) total += value;
        });
        totalWeightDisplay.textContent = total.toFixed(2);
    }

    addCargoBtn.addEventListener("click", function () {
        const firstCargo = document.querySelector(".cargo-item");
        const newCargo = firstCargo.cloneNode(true);
        newCargo.querySelectorAll("input, textarea, select").forEach(input => input.value = "");
        cargoContainer.appendChild(newCargo);
        updateSections();
    });

    cargoContainer.addEventListener("click", function (e) {
        if (e.target.classList.contains("removeCargo")) {
            const items = document.querySelectorAll(".cargo-item");
            if (items.length > 1) {
                e.target.closest(".cargo-item").remove();
                updateSections();
                calculateTotalWeight();
            }
        }
    });

    cargoContainer.addEventListener("input", function (e) {
        if (e.target.classList.contains("weight-field")) {
            calculateTotalWeight();
        }
    });

    updateSections();
});
</script>

</body>
</html>
