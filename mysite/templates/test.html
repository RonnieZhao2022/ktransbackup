            td, th {
            /* 设置td,th宽度高度 */
            border:1px solid gray;
            width:auto;
            height:auto;
        }


        td:first-child, th:first-child {
            position:sticky;
            left:0; /* 首行永远固定在左侧 */
            z-index:1;
            background-color:lightgrey;
        }
        thead tr th {
            position:sticky;
            top:0; /* 列首永远固定在头部  */
            background-color:lightblue;
        }
        th:first-child{
            z-index:2;
            background-color:lightgrey;
        }
    </style>
