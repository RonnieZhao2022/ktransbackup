<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>信息查询</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>


            td, th {
            /* 设置td,th宽度高度 */
            border:1px solid gray;
            width:auto;
            height:auto;
        }


        td:first-child, th:first-child {
            position:sticky;
            left:0; /* 首行永远固定在左侧 */
            z-index:1;
            background-color:lightgrey;
        }
        thead tr th {
            position:sticky;
            top:0; /* 列首永远固定在头部  */
            background-color:lightblue;
        }
        th:first-child{
            z-index:2;
            background-color:lightgrey;
        }
    </style>
</head>
<body>

<div class="container">
        <div >
            <table class="table" style="font-size:15px;white-space:nowrap">
                 <caption class="caption-top">符合查询规则的共有{{myresult|length}}条记录</caption>
                  <thead>
                    <tr>
                        <th scope="col"  style="background-color:lightblue">ID</th>
                        <th scope="col"  style="background-color:lightblue">紧急事项</th>
                        <th scope="col"  style="background-color:lightblue">货柜号</th>
                        <th scope="col"  style="background-color:lightblue">公司名称</th>
                        <th scope="col"  style="background-color:lightblue">收货人电邮</th>
                        <th scope="col"  style="background-color:lightblue">收货人电话</th>
                        <th scope="col"  style="background-color:lightblue">收货人地址</th>
                        <th scope="col"  style="background-color:lightblue">CCN</th>
                        <th scope="col"  style="background-color:lightblue">OLD_CCN</th>
                        <th scope="col"  style="background-color:lightblue">操作员</th>
                    </tr>
                  </thead>


                  <tbody >

                  {%  for row in myresult %}




                    <tr >
                        {%  for td in row %}

                            {%  if loop.index == 2 or loop.index == 7  %}

                                <td class="text-truncate" style="max-width: 200px;">{{td}}</td>

                            {%  elif loop.index == 1  %}

                                <td class="text-truncate" ><a href="/change/{{td}}/"  target="_blank" >{{td}}</a></td>


                            {% else  %}

                                <td class="text-truncate">{{td}}</td>

                            {% endif  %}


                        {% endfor  %}



                    </tr>
                  {% endfor  %}

                  </tbody>





            </table>
        </div>

    </div>



<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
</body>
</html>
