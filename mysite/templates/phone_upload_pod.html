<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POD 文件上传</title>

<style>
body { font-family: Arial, sans-serif; padding: 20px; }

#drop_zone {
    border: 2px dashed #888;
    border-radius: 10px;
    padding: 40px;
    text-align: center;
    color: #555;
    margin-bottom: 15px;
    cursor: pointer;
    transition: 0.2s;
}
#drop_zone.hover { border-color: #3366cc; color: #3366cc; }

.file-item {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
}

.file-item img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    margin-right: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

.file-info { flex: 1; }

.progress-bar {
    height: 6px;
    background: #3366cc;
    width: 0%;
    border-radius: 4px;
    margin-top: 5px;
}

select, button {
    padding: 8px 12px;
    font-size: 15px;
    margin-top: 10px;
}

#result { margin-top: 15px; }
.success { color: green; }
.error { color: red; }
</style>
</head>

<body>

<h2>POD 文件上传</h2>

<div>
    <label>文件类型：</label>
    <select id="doc_type">
        <option value="HBL">HBL</option>
        <option value="EMNFT">EMNFT</option>
        <option value="YYZ1_POD">YYZ1_POD</option>
        <option value="YYZ2_POD">YYZ2_POD</option>
        <option value="YYZ3_POD">YYZ3_POD</option>
        <option value="YYZ4_POD">YYZ4_POD</option>
        <option value="YYZ5_POD">YYZ5_POD</option>
        <option value="YYZ6_POD">YYZ6_POD</option>
        <option value="YYZ7_POD">YYZ7_POD</option>
        <option value="YYZ8_POD">YYZ8_POD</option>
        <option value="YYZ9_POD">YYZ9_POD</option>
        <option value="YXU1_POD">YXU1_POD</option>
        <option value="YHM1_POD">YHM1_POD</option>
        <option value="YOW1_POD">YOW1_POD</option>
        <option value="YOW3_POD">YOW3_POD</option>
    </select>
</div>

<div id="drop_zone">拖拽文件到这里，或点击选择文件，或直接 Ctrl+V 粘贴截图</div>
<input type="file" id="file_input" accept="image/*,application/pdf" multiple style="display:none;">
<div id="file_list"></div>

<button id="upload_btn" disabled>上传文件</button>
<div id="result"></div>

<script>
const dropZone = document.getElementById('drop_zone');
const fileInput = document.getElementById('file_input');
const fileListDiv = document.getElementById('file_list');
const uploadBtn = document.getElementById('upload_btn');
const resultDiv = document.getElementById('result');

let selectedFiles = [];

// 获取 cargo_id
let urlParts = window.location.pathname.split('/');
let cargo_id = urlParts[urlParts.length - 2];

// 点击打开文件选择
dropZone.addEventListener('click', () => fileInput.click());

// 文件选择
fileInput.addEventListener('change', e => {
    if (e.target.files.length) handleFiles(e.target.files);
});

// 拖拽支持
dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('hover');
});
dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('hover');
});
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('hover');
    handleFiles(e.dataTransfer.files);
});

// 粘贴支持（支持邮件截图）
document.addEventListener('paste', function (e) {
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].kind === 'file') {
            const file = items[i].getAsFile();
            if (file) handleFiles([file]);
        }
        if (items[i].type.indexOf('text/html') !== -1) {
            items[i].getAsString(function (html) {
                const div = document.createElement('div');
                div.innerHTML = html;
                const img = div.querySelector('img');
                if (img && img.src.startsWith('data:image')) {
                    fetch(img.src)
                        .then(res => res.blob())
                        .then(blob => {
                            const file = new File([blob], "pasted.png", { type: blob.type });
                            handleFiles([file]);
                        });
                }
            });
        }
    }
});

// 处理文件
function handleFiles(files) {
    const allowed = ['jpg','jpeg','png','pdf'];

    for (let file of files) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (!allowed.includes(ext)) {
            alert('只允许 JPG/PNG/PDF 文件');
            continue;
        }
        selectedFiles.push(file);
        displayFile(file);
    }

    uploadBtn.disabled = selectedFiles.length === 0;
}

// 显示文件
function displayFile(file) {
    const index = selectedFiles.length - 1;

    const itemDiv = document.createElement('div');
    itemDiv.className = 'file-item';

    const preview = document.createElement('div');

    if (file.type === 'application/pdf') {
        preview.textContent = 'PDF';
        preview.style.width = '70px';
        preview.style.textAlign = 'center';
    } else {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
    }

    const infoDiv = document.createElement('div');
    infoDiv.className = 'file-info';
    infoDiv.innerHTML = `
        <div>准备上传</div>
        <div class="progress-bar" id="progress_${index}"></div>
    `;

    itemDiv.appendChild(preview);
    itemDiv.appendChild(infoDiv);
    fileListDiv.appendChild(itemDiv);
}

// 上传
uploadBtn.addEventListener('click', () => {

    const docType = document.getElementById('doc_type').value;
    uploadBtn.disabled = true;
    uploadBtn.textContent = '上传中...';

    selectedFiles.forEach((file, index) => {

        const ext = file.name.split('.').pop();
        const newName = `${cargo_id}_${docType}.${ext}`;
        const newFile = new File([file], newName, { type: file.type });

        const formData = new FormData();
        formData.append('pod_photo', newFile);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', `/phone_upload_pod/${cargo_id}/`, true);

        xhr.upload.addEventListener('progress', e => {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                document.getElementById(`progress_${index}`).style.width = percent + '%';
            }
        });

        xhr.onload = () => {
            if (xhr.status === 200) {
                resultDiv.innerHTML += `<div class="success">${newName} 上传成功</div>`;
            } else {
                resultDiv.innerHTML += `<div class="error">${newName} 上传失败</div>`;
            }
        };

        xhr.send(formData);
    });

    selectedFiles = [];
    fileListDiv.innerHTML = '';
    uploadBtn.textContent = '上传文件';
});
</script>

</body>
</html>
