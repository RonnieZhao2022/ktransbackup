<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBA 货物明细录入</title>

<!-- Bootstrap 5 CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    .table-responsive { max-height: 500px; overflow-y: auto; }
    .table thead { background-color: #ffecb3; color: #212529; }
    .table-hover tbody tr:hover { background-color: #fff3e0; }
    .accordion-button { background-color: #ffe0b2; color: #212529; font-weight: 600; }
    .accordion-button:not(.collapsed) { background-color: #ffd180; color: #212529; }
    input.pallets-input { width: 80px; text-align: center; font-size: 1rem; }
    body { font-size: 0.95rem; }
    .btn-lg { padding: 0.5rem 1.2rem; font-size: 1.1rem; }
</style>
</head>
<body>

<div class="container my-3">
    <h2 class="text-center mb-3">FBA 货物明细录入</h2>

    <form method="post" action="{{ url_for('fba_edit') }}">
        <div class="accordion" id="cargoAccordion">
            {% for cargo_id, cargo in cargo_data.items() %}
            <div class="accordion-item mb-2">
                <h2 class="accordion-header" id="heading{{ loop.index }}">
                    <button class="accordion-button collapsed" type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#collapse{{ loop.index }}"
                            aria-expanded="false"
                            aria-controls="collapse{{ loop.index }}">
                        {{ cargo_id }} - {{ cargo.container_number }} - {{ cargo.status }}
                    </button>
                </h2>

                <div id="collapse{{ loop.index }}" class="accordion-collapse collapse"
                     aria-labelledby="heading{{ loop.index }}" data-bs-parent="#cargoAccordion">
                    <div class="accordion-body p-1">

                        <div class="table-responsive">
                            <table class="table table-striped table-bordered table-hover table-sm align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Shipment ID</th>
                                        <th>Mark</th>
                                        <th>Pallets</th>
                                        <th>Pieces</th>
                                        <th>PO List</th>
                                        <th>FBA</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {% for row in cargo.details %}
                                    <tr>
                                        <td>{{ row[0] }}</td>
                                        <td>{{ row[1] }}</td>
                                        <td>
                                            <input type="number" class="form-control pallets-input"
                                                   name="pallets_{{ cargo_id }}_{{ row[0] }}"
                                                   value="{{ row[2] if row[2] else 0 }}"
                                                   min="0" inputmode="numeric">
                                        </td>
                                        <td>{{ row[3] }}</td>
                                        <td>{{ row[4] }}</td>
                                        <td>{{ row[5] }}</td>
                                    </tr>
                                    {% endfor %}
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="mt-3 text-center">
            <button type="submit" class="btn btn-primary btn-lg w-50">提交修改</button>
        </div>
    </form>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
