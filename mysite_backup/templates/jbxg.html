<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>局部修改</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

<body>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-Lge2E2XotzMiwH69/MXB72yLpwyENMiOKX8zS8Qo7LDCvaBIWGL+GlRQEKIpYR04" crossorigin="anonymous"></script>


<div class = "container">



    <h3>{{ID}}局部信息修改</h3>

    <form method="post">


            <div class="form-row">
                <h4>{{ID}}局部修改</h4>
                <!--标注是否扣货  -->
                <div class="form-group col-md-4">
                      <label for="fieldName">选择列名</label>
                      <select id="fieldName"  name = "fieldName"  class="form-control">
                            <option selected></option>
                            <option>是否扣货</option>
                            <option>状态</option>
                            <option>货物数量</option>
                            <option>火车公司</option>


                      </select>
                </div>

                <div class="form-group col-md-4">
                        <label for="content" class="form-label">修改后内容</label>
                        <input type="text" class="form-control" id="content" name = "content" >
                </div>


            <div>

            <button type="submit" class="btn btn-primary">Sign in</button>
    </form>


</div>


</body>
</html>
