<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>大{{area}}地区卡派价格查询</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
<body>



    <div class = "container p-2 mx-auto" >

        <h3 class="text-conter">欢迎使用Ktrans卡车派送价格查询系统</h3>

    </div>

    <div class = "container p-2 mx-auto" >

        <h2 class="text-conter">大{{area}}地区</h2>

    </div>




<div class = "container"  >



        <form method="post"  enctype="multipart/form-data">


                <div class="form-row bg-light text-dark">
                    <!--标注货物托盘数  -->

                    <div class="form-group col-md-2">

                        <label for="number_of_pallets" class="form-label">请输入货物托盘数*(必填)</label>

                         {%  if area == "TORONTO" %}

                                <input type="number"  min = "1" max = "10" class="form-control" required id="number_of_pallets" name = "number_of_pallets"  placeholder = "仅限1-10整数数字" >

                        {%  elif area == "VANCOUVER" %}

                                <input type="number"  min = "1" max = "12" class="form-control" required id="number_of_pallets" name = "number_of_pallets"  placeholder = "仅限1-12整数数字" >

                        {% else  %}

                                <input type="number"  min = "1" max = "10" class="form-control" required  id="number_of_pallets" name = "number_of_pallets"  placeholder = "输入仅限整数数字" >

                        {% endif  %}



                    </div>

                     <!--标注货物尺寸  -->
                    <div class="form-group col-md-10">
                        <label for="cargo_size" class="form-label">请输入货物尺寸*(选填）</label>
                        <input type="text" class="form-control" id="cargo_size" name = "cargo_size"  placeholder = "以厘米为单位长*宽*高*托盘数" >
                    </div>
                </div>


                <div class="form-row bg-light text-dark">

                    <!--标注派送地址  -->
                    <div class="form-group col-md-8">
                        <label for="delivery_address" class="form-label">请输入派送地址*(必填)</label>
                        <input type="text" class="form-control" required id="delivery_address" name = "delivery_address"  placeholder = "" >
                    </div>

                    <!--标邮政编码  -->
                    <div class="form-group col-md-4">
                        <label for="delivery_address" class="form-label">请输入邮政编码*(必填)</label>
                        <input type="text" required class="form-control" id="postcode" name = "postcode"  placeholder = "字母全部大写。例如：M1A 1A1或M1A1A1" pattern = "[ABCEGHJKLMNPRSTVXY][0-9][ABCEGHJKLMNPRSTVWXYZ] ?[0-9][ABCEGHJKLMNPRSTVWXYZ][0-9]">

                    </div>

                </div>


                <div class="form-row bg-light text-dark">

                    <!--标重量  -->
                    <div class="form-group col-md-3">
                        <label for="weight" class="form-label">请输入重量*以公斤为单位(必填)</label>
                        <input type="number" step = "0.01" required class="form-control" id="weight" name = "weight"  placeholder = "以公斤为单位"  >

                    </div>

                    <!--标注是否需要尾板  -->
                    <div class="form-group col-md-3">
                        <label for="tailgate"  class="form-label">是否需要尾板*(必选)</label>

                        <select id="tailgate" required name = "tailgate"  class="form-control">
                                <option selected></option>
                                <option >有loading dock</option>
                                <option >需要尾板</option>

                        </select>


                    </div>

                    <!--标注是否居民区  -->
                    <div class="form-group col-md-3">
                        <label for="residential"  class="form-label">是否居民区*(必选)</label>

                        <select id="residential" required  name = "residential"  class="form-control">
                                <option selected></option>
                                <option >商业地址</option>
                                <option >居民区</option>

                        </select>


                    </div>






                     <div class="form-group col-md-3">
                        <label for="city"  class="form-label">目的地所在城市*(必选)</label>

                        <select id="city" required name = "city"  class="form-control">
                                <option selected></option>
                                {% for i in cityList %}
                                    <option>{{i[0]}}</option>
                                {% endfor %}

                        </select>


                    </div>

                </div>





                <button type="submit" class="btn btn-primary">提交</button>






        </form>

</div>

<div class = "container">
    <hr>
</div>

<div class = "container">

    <p><strong>注：</strong></p>

    <ul>
        <li>如需使用尾板，尾板费CAD50</li>
        <li>居民区派送，CAD15/票</li>
        <li>单板超过600公斤无法用尾板卸货。有loading dock 重量600-1000公斤,收费标准：超重费CAD20/板。</li>
        <li>如是超重超规格以及偏远地区，请直接联系我们单独报价。邮箱地址：</li>


    </ul>





</div>


</body>
</html>
