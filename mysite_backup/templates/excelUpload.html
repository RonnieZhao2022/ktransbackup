<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>上传录入FBA表单</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">📂 上传录入表单</h4>
        </div>
        <div class="card-body">
            <form id="uploadForm" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>

                <!-- 文件上传 -->
                <div class="mb-3">
                    <label for="file" class="form-label">选择 Excel 文件：</label>
                    <input type="file" class="form-control" id="file" name="file" required>
                    <div class="invalid-feedback">请选择一个 Excel 文件</div>
                </div>

                <!-- 单选框 -->
                <div class="mb-3">
                    <label class="form-label d-block">选择录入类型：</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" id="linkup_in" name="entry_type" value="恒好达" required>
                        <label class="form-check-label" for="linkup_in">恒好达</label>
                    </div>


                    <div class="form-check mt-2">
                        <input class="form-check-input" type="radio" id="fourlproducts" name="entry_type" value="Becko">
                        <label class="form-check-label" for="fourlproducts">Becko</label>
                    </div>


                </div>

                <!-- 单行文本录入 -->
                <div class="mb-3">
                    <label for="cargo_id" class="form-label">单号（格式：T123456）：</label>
                    <input type="text" class="form-control" id="cargo_id" name="cargo_id" required
                           pattern="([TV][0-9]{6})"
                           title="T或V开头，后接6位数字，不可以留空"
                           placeholder="不可以留空">

                </div>



                <!-- 提交按钮 -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">上传</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



</body>
</html>
