<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>制式汇率转换工具</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        .bs-example{
            margin: 20px;
        }
    </style>



</head>

<body >
    <div class = "container">

        <form id="conversion-form">
            <div class="form-group">
                <label for="cad-usd">CAD-USD 普通加币转美金!汇率1:1.32</label><br>
                <input type="number" class="form-control"  step = "0.01" id="cad-usd"  name ="cad-usd" placeholder="请输入需要转换加币值">
                <button type="submit">转换</button>
                <p id = "cad-usd-result">最终结果</p><br>
            </div>
        </form>

        <script>
            document.getElementById("conversion-form").addEventListener("submit", function(event) {
                event.preventDefault(); // 阻止表单的默认行为

              var cadValue = document.getElementById("cad-usd").value; // 获取用户输入的加币值
              var usdValue = cadValue / 1.32; // 将加币值转换为美元值

                usdValue = usdValue.toFixed(2)

              document.getElementById('cad-usd-result').innerText = "最终结果:"+ cadValue + "加币 = " + usdValue + "美元";

            });

        </script>


        <form id="amass-conversion-form">
            <div class="form-group">
                <label for="amass-cad-usd">Amass CAD-USD美设加币转美金!汇率1:1.32</label><br>
              <input type="number" class="form-control"   step = "0.01" id="amass-cad-usd"  placeholder="请输入需要转换加币值">
              <button type="submit">转换</button>
              <p id = "amass-cad-usd-result">最终结果</p><br>
            </div>
        </form>

        <script>
            document.getElementById("amass-conversion-form").addEventListener("submit", function(event) {
                event.preventDefault(); // 阻止表单的默认行为

              var cadValue = document.getElementById("amass-cad-usd").value; // 获取用户输入的加币值
              var usdValue = cadValue / 1.32; // 将加币值转换为美元值

                usdValue = usdValue.toFixed(2)

              document.getElementById('amass-cad-usd-result').innerText = "最终结果:"+ cadValue + "加币 = " + usdValue + "美元";

            });

         </script>

          <form id="KG-LB-form">
            <div class="form-group">
                <label for="KG-LB">公斤转磅</label><br>
              <input type="number" class="form-control"   step = "0.01" id="KG-LB"  placeholder="请输入需要转换公斤值">
              <button type="submit">转换</button>
              <p id = "KG-LB-result">最终结果</p><br>
            </div>
        </form>

        <script>
            document.getElementById("KG-LB-form").addEventListener("submit", function(event) {
                event.preventDefault(); // 阻止表单的默认行为

              var KGValue = document.getElementById("KG-LB").value; // 获取用户输入的公斤值
              var LBValue = KGValue*2.2046; // 将公斤值转换为磅值

                LBValue = LBValue.toFixed(2)

              document.getElementById('KG-LB-result').innerText = "最终结果:"+ KGValue + "公斤 = " + LBValue + "磅";

            });

         </script>



         <form id="cm-inch-form">
           <div class="form-group">
          <label for="row-string">公制 英寸转换。目前仅支持厘米和毫米，如是其他单位请转换成上述单位再输入! </label><br>
          <input type="text" class="form-control" id="row-string"  name ="row-string"  placeholder="请输入需要转换货物长宽高信息" ><br>


          <label >请选择公制单位 </label><br>
          <input type="radio"  id="unit1" name="unit" value="10" checked/>
          <label for="unit1">厘米CM</label><br>



          <input type="radio"   id="unit3" name="unit" value="1" />
          <label for="unit3" >毫米MM</label><br>




          <button type="submit">转换</button>
          <p id = "cm-inch-result">最终结果</p><br>
          </div>
        </form>

        <script>

            document.getElementById("cm-inch-form").addEventListener("submit", function(event) {
                event.preventDefault(); // 阻止表单的默认行为

              var row = document.getElementById("row-string").value;

              var numList = row.match(/\d+(\.\d+)?[cCmM][mM]/g);

              var item = null;

              var obj = document.getElementsByName("unit");

              for (var i = 0 ; i < obj.length; i++) {
                  if (obj[i].checked){
                  item = obj[i].value;
                  }
              }


              var result = row;


              for (var i = 0 ; i < numList.length; i++) {
                  var str = '';
                  var num = numList[i].match(/\d+(\.\d+)?/);

                  var numInch = num[0]*0.03937*item;

                      numInch = numInch.toFixed(2);
                      str += numInch + "IN ";

                      result = result.replace(numList[i], str);


              }

              document.getElementById('cm-inch-result').innerText = result ;

            });

         </script>






    </div>
















</body>
</html>
